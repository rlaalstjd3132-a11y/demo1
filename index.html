<!DOCTYPE html>
<html>
<head>
    <title>비전공자 수업 데모</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 헤더 */
        header {
            background-color: #2c3e50;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-end;
        }
        .login-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .login-btn:hover {
            background-color: #2980b9;
        }

        /* 본문 레이아웃 */
        .wrapper {
            display: flex;
            flex: 1;
        }

        /* 사이드바 */
        nav {
            width: 200px;
            background-color: #2c3e50;
            color: white;
            padding-top: 20px;
            flex-shrink: 0;
        }
        nav ul {
            list-style: none;
        }
        nav li {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.3s;
            text-align: left;
        }
        nav li:hover {
            background-color: #34495e;
        }

        /* 메인 콘텐츠 */
        main {
            flex-grow: 1;
            padding: 50px;
            text-align: center;
        }
        h1 { color: #2c3e50; }
        p {
            color: #7f8c8d;
            margin-top: 10px;
        }

        /* 푸터 */
        footer {
            background-color: #f8f9fa;
            padding: 20px;
            border-top: 1px solid #eee;
            color: #95a5a6;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <button class="login-btn" onclick="alert('로그인')">로그인</button>
</header>

<div class="wrapper">
    <nav>
        <ul>
            <li>🏠 홈</li>
            <li>📊 통계</li>
            <li>⚙️ 설정</li>
            <li>👤 프로필</li>
        </ul>
    </nav>

    <main>
        <h1>🎉 축하합니다! 배포에 성공하셨습니다!</h1>
        <p>CodeRabbit + Slack + GitHub Pages 조합을 완성하셨네요.</p>
        <p>이 웹사이트는 전 세계 어디서든 이 URL로 접속할 수 있습니다.</p>
        <p>이건 feature/PR 테스트 코드입니다.</p>
    </main>
</div>

<footer>
    &copy; 2026 비전공자 수업 데모. All rights reserved.
</footer>

</body>
</html>
